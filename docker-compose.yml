# ============================================
# Docker Compose — PRODUCTION (Port 8020)
# Deploy via Portainer Stacks di Ubuntu
# ============================================

services:

  # ─── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: eup-pis-nginx
    ports:
      - "8020:80"               # ← PORT PRODUCTION
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ─── Next.js App ───────────────────────────
  app:
    build: .
    image: eup-pis:latest
    container_name: eup-pis-app
    volumes:
      - uploads:/app/public/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}   # Alias untuk NextAuth v5
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Beri waktu 2 menit untuk migrasi DB
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: eup-pis-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

volumes:
  pgdata:
    name: eup-pis-pgdata
  uploads:
    name: eup-pis-uploads
